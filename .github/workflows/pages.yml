name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Права, нужные для публикации Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускать две публикации разом; новую — вместо старой
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
